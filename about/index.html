pre {

.toc-list {

.toc-item, .toc-folder { margin: 0; }

.toc-level-1 { --indent: 0rem; --bullet-size: 0.7rem; }
.toc-level-2 { --indent: 1.15rem; --bullet-size: 0.64rem; }

.toc-item > a,
.toc-tree-link,
.toc-folder > summary {
  position: relative;
  display: block;
  color: #717171;
  text-decoration: none;
  font-size: 0.94rem;
  line-height: 1.33;
  padding: 0.1rem 0 0.1rem calc(var(--indent, 0rem) + 1.06rem);
}

.toc-item > a::before,
.toc-tree-link::before,
.toc-folder > summary::before {

  left: calc(var(--indent, 0rem));
  top: 0.44rem;
  width: var(--bullet-size, 0.64rem);
  height: var(--bullet-size, 0.64rem);

}

.toc-item > a:hover,
.toc-item > a.is-active,

</style>
  <script>window.addEventListener('DOMContentLoaded', () => {
  try {
    if (window.Prism) Prism.highlightAll();
  } catch {}

  const tocLinks = Array.from(document.querySelectorAll('.toc-nav a'));
  const headings = tocLinks
    .map(link => document.getElementById((link.getAttribute('href') || '').slice(1)))
    .filter(Boolean);

  if (!tocLinks.length || !headings.length || !('IntersectionObserver' in window)) return;

  const byId = new Map(tocLinks.map(link => [link.getAttribute('href').slice(1), link]));
  const observer = new IntersectionObserver((entries) => {
    for (const entry of entries) {
      if (!entry.isIntersecting) continue;
      for (const link of tocLinks) link.classList.remove('is-active');
      const active = byId.get(entry.target.id);
      if (active) active.classList.add('is-active');
    }
  }, { rootMargin: '-20% 0px -70% 0px', threshold: 0.1 });

  for (const heading of headings) observer.observe(heading);
});
</script>
